<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ProCV Path — Resume Builder</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&family=Lora:ital,wght@0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
    :root {
        --navy:   #060d1f;
        --navy2:  #0b1630;
        --navy3:  #111d3a;
        --teal:   #00e5c3;
        --teal2:  #00c9aa;
        --amber:  #f5a623;
        --white:  #ffffff;
        --mist:   #c8d6f0;
        --steel:  #8899bb;
        --border: rgba(0,229,195,.13);
        --danger: #f87171;
        --sans:   'Outfit', system-ui, sans-serif;
        --serif:  'Cormorant Garamond', Georgia, serif;
        --resume-serif: 'Lora', Georgia, serif;
        --resume-sans:  'Outfit', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 10px; }
    body {
        font-family: var(--sans);
        font-size: 1.6rem;
        background: var(--navy);
        color: var(--white);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
    }
    img { width: 100%; display: block; }
    a   { text-decoration: none; color: inherit; }
    textarea { resize: none; }

    /* ── NAVBAR ── */
    .site-nav {
        position: sticky; top: 0; z-index: 200;
        height: 64px;
        display: flex; align-items: center;
        background: rgba(6,13,31,.95);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--border);
    }
    .site-nav .container {
        max-width: 100%; padding: 0 2.4rem;
        display: flex; align-items: center; justify-content: space-between; width: 100%;
    }
    .nav-brand {
        display: flex; align-items: center; gap: .9rem;
        font-family: var(--serif); font-size: 2rem; font-weight: 700;
    }
    .nav-brand-icon { width: 32px; filter: drop-shadow(0 0 5px var(--teal)); }
    .nav-brand em { font-style: normal; color: var(--teal); }
    .nav-back {
        font-size: 1.4rem; color: var(--steel);
        display: flex; align-items: center; gap: .5rem;
        transition: color .2s;
    }
    .nav-back:hover { color: var(--teal); }

    /* ── SPLIT LAYOUT ── */
    .builder-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: calc(100vh - 64px);
    }

    /* ━━━━ LEFT — FORM SIDE ━━━━ */
    .form-panel {
        padding: 4rem 3.2rem 6rem;
        overflow-y: auto;
        max-height: calc(100vh - 64px);
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
    }
    .form-panel::-webkit-scrollbar { width: 4px; }
    .form-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .form-panel-inner { max-width: 640px; margin-left: auto; }

    .form-panel-title {
        font-family: var(--serif); font-size: 3.2rem; font-weight: 700;
        color: var(--white); margin-bottom: .5rem;
        animation: slideIn .5s ease both;
    }
    .form-panel-sub {
        font-size: 1.5rem; color: var(--steel); margin-bottom: 3.6rem;
        animation: slideIn .5s .08s ease both;
    }
    @keyframes slideIn {
        from { opacity: 0; transform: translateX(-18px); }
        to   { opacity: 1; transform: translateX(0); }
    }

    /* Section blocks */
    .cv-form-blk {
        margin-bottom: 2.4rem;
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: rgba(11,22,48,.6);
        backdrop-filter: blur(8px);
        animation: fadeUp .45s ease both;
    }
    .cv-form-blk:nth-child(1)  { animation-delay: .05s; }
    .cv-form-blk:nth-child(2)  { animation-delay: .10s; }
    .cv-form-blk:nth-child(3)  { animation-delay: .15s; }
    .cv-form-blk:nth-child(4)  { animation-delay: .20s; }
    .cv-form-blk:nth-child(5)  { animation-delay: .25s; }
    .cv-form-blk:nth-child(6)  { animation-delay: .30s; }
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .cv-form-row-title {
        display: flex; align-items: center; gap: 1rem;
        padding: 1.4rem 2rem;
        background: rgba(0,229,195,.07);
        border-bottom: 1px solid var(--border);
    }
    .cv-form-row-title-icon { font-size: 1.6rem; }
    .cv-form-row-title h3 {
        font-size: 1.2rem; font-weight: 600;
        text-transform: uppercase; letter-spacing: 1.8px;
        color: var(--teal);
    }

    .cv-form-row {
        padding: 2.4rem 2rem;
    }
    .cv-form-row-about { padding: 2rem; }

    /* Repeater inner rows */
    .cv-form-row.cv-form-row-experience,
    .cv-form-row.cv-form-row-achievement,
    .cv-form-row.cv-form-row-skills {
        position: relative;
        border: 1px solid rgba(0,229,195,.1);
        border-radius: 10px;
        margin-bottom: 1.2rem;
        padding: 2rem;
        background: rgba(6,13,31,.5);
    }

    .row-separator { padding: 1.4rem 2rem 2rem; }

    /* Form elements */
    .form-elem { margin-bottom: 2rem; position: relative; }
    .form-label {
        display: block;
        font-size: 1.2rem; font-weight: 600;
        letter-spacing: .5px; text-transform: uppercase;
        color: var(--steel); margin-bottom: .6rem;
    }
    .opt-text { font-weight: 400; font-size: 1.1rem; color: var(--steel); text-transform: none; }

    .form-control {
        width: 100%;
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 8px;
        padding: 1.05rem 1.3rem;
        font-family: var(--sans);
        font-size: 1.45rem; color: var(--white);
        outline: none;
        transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .form-control::placeholder { color: rgba(255,255,255,.2); }
    .form-control:focus {
        border-color: var(--teal);
        background: rgba(0,229,195,.04);
        box-shadow: 0 0 0 3px rgba(0,229,195,.1);
    }
    input[type="date"].form-control { color-scheme: dark; }
    input[type="file"].form-control { padding: .9rem 1.3rem; cursor: pointer; }

    .form-text {
        position: absolute; top: calc(100% + 3px); left: 0;
        color: var(--danger); font-size: 1.15rem;
    }

    .cols-3, .cols-2 { display: grid; gap: 1.4rem; }

    /* Repeater buttons */
    .repeater-add-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 30px; height: 30px; border-radius: 8px;
        background: var(--teal); color: var(--navy);
        font-size: 2rem; font-weight: 700;
        border: none; cursor: pointer; margin-top: .8rem;
        transition: transform .2s, box-shadow .2s;
    }
    .repeater-add-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(0,229,195,.35); }

    .repeater-remove-btn {
        position: absolute; top: 1rem; right: 1rem;
        width: 24px; height: 24px; border-radius: 50%;
        background: rgba(248,113,113,.12);
        border: 1px solid rgba(248,113,113,.35);
        color: var(--danger);
        font-size: 1.6rem; font-weight: 700; line-height: 1;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; z-index: 10;
        transition: background .2s, color .2s;
    }
    .repeater-remove-btn:hover { background: var(--danger); color: var(--white); }

    /* ━━━━ RIGHT — PREVIEW PANEL ━━━━ */
    .preview-panel {
        position: sticky; top: 64px;
        height: calc(100vh - 64px);
        overflow-y: auto;
        background: #eef0f5;
        padding: 2.8rem 2rem;
        display: flex; flex-direction: column; align-items: center;
        scrollbar-width: thin;
        scrollbar-color: rgba(0,0,0,.15) transparent;
    }
    .preview-panel::-webkit-scrollbar { width: 4px; }
    .preview-panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 4px; }

    /* Topbar in preview */
    .preview-topbar {
        width: 100%; max-width: 600px;
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 2rem;
    }
    .preview-label {
        font-size: 1.1rem; font-weight: 700; letter-spacing: 2px;
        text-transform: uppercase; color: #8899bb;
        font-family: var(--sans);
    }
    .print-btn {
        display: inline-flex; align-items: center; gap: .6rem;
        background: #0b1630;
        color: #fff; font-family: var(--sans);
        font-weight: 600; font-size: 1.35rem;
        padding: .85rem 1.8rem; border-radius: 8px;
        border: none; cursor: pointer;
        transition: background .2s, box-shadow .2s;
    }
    .print-btn:hover { background: #111d3a; box-shadow: 0 6px 20px rgba(0,0,0,.25); }

    /* ━━━━ RESUME CARD ━━━━ */
    .preview-cnt {
        width: 100%; max-width: 600px;
        background: #fff;
        box-shadow: 0 24px 72px rgba(0,0,0,.22), 0 0 0 1px rgba(0,0,0,.06);
        border-radius: 4px;
        display: grid;
        grid-template-columns: 180px 1fr;
        min-height: 820px;
        font-family: var(--resume-serif);
        overflow: hidden;
    }

    /* Resume left sidebar */
    .preview-cnt-l {
        background: #0f1e3d;
        padding: 2.8rem 1.8rem;
        color: #fff;
    }
    .preview-image {
        width: 96px; height: 96px;
        border-radius: 50%; overflow: hidden;
        margin: 0 auto 1.4rem;
        border: 3px solid rgba(0,229,195,.45);
    }
    .preview-image img { width: 100%; height: 100%; object-fit: cover; }

    .preview-item-name {
        font-family: var(--resume-serif);
        text-align: center; font-size: 1.6rem; font-weight: 600;
        line-height: 1.3; color: #fff;
        padding-bottom: 1rem; margin-bottom: .6rem;
        border-bottom: 1px solid rgba(0,229,195,.2);
    }
    .preview-designation {
        text-align: center;
        font-family: var(--resume-sans);
        font-size: 1rem; font-weight: 500; letter-spacing: 1.2px;
        text-transform: uppercase; color: #00e5c3;
        margin-bottom: 2.4rem;
    }
    .preview-blk { margin-bottom: 2.2rem; }
    .preview-blk-title { margin-bottom: .8rem; }
    .preview-blk-title h3 {
        font-family: var(--resume-sans);
        font-size: .95rem; font-weight: 700;
        letter-spacing: 2px; text-transform: uppercase;
        color: #00e5c3;
        padding-bottom: .4rem;
        border-bottom: 1px solid rgba(0,229,195,.18);
    }

    /* Left column items (contact/summary) */
    .preview-cnt-l .preview-blk-list .preview-item {
        font-family: var(--resume-sans);
        font-size: 1.15rem; line-height: 1.55;
        color: rgba(255,255,255,.78);
        margin-bottom: .45rem;
    }

    /* Skills pills */
    .skills-items .preview-item {
        display: inline-block;
        margin-right: .5rem; margin-bottom: .5rem;
    }
    .skills-items .preview-item .preview-item-val {
        display: inline-block;
        background: rgba(0,229,195,.12);
        border: 1px solid rgba(0,229,195,.28);
        color: #00e5c3;
        font-family: var(--resume-sans);
        font-size: 1.1rem; font-weight: 500;
        padding: .25rem .9rem; border-radius: 4px;
    }

    /* Resume right main column */
    .preview-cnt-r {
        padding: 2.8rem 2.4rem;
        background: #fff;
    }
    .preview-cnt-r .preview-blk-title h3 {
        font-family: var(--resume-sans);
        font-size: .95rem; font-weight: 700;
        letter-spacing: 2px; text-transform: uppercase;
        color: #0f1e3d;
        padding-bottom: .4rem;
        border-bottom: 2px solid #00e5c3;
        margin-bottom: .5rem;
    }
    .preview-cnt-r .preview-blk-list .preview-item {
        font-size: 1.18rem; color: #2a3555;
        line-height: 1.6; margin-top: 1.4rem;
        font-family: var(--resume-sans);
    }

    /* Education & Experience items */
    .educations-items .preview-item span:first-child,
    .experiences-items .preview-item span:first-child {
        display: block;
        font-family: var(--resume-serif);
        font-size: 1.35rem; font-weight: 600;
        color: #0f1e3d; margin-bottom: .3rem;
    }
    .educations-items .preview-item span:nth-child(2),
    .experiences-items .preview-item span:nth-child(2) {
        font-weight: 600; color: #3a4a70; margin-right: .7rem;
        font-size: 1.15rem;
    }
    .educations-items .preview-item span:nth-child(3),
    .experiences-items .preview-item span:nth-child(3) {
        font-style: italic; color: #7a8aaa; margin-right: .7rem;
        font-size: 1.15rem;
    }
    .educations-items .preview-item span:nth-child(4),
    .educations-items .preview-item span:nth-child(5),
    .experiences-items .preview-item span:nth-child(4),
    .experiences-items .preview-item span:nth-child(5) {
        display: inline-block;
        background: rgba(0,229,195,.1);
        color: #00a88f;
        font-size: 1.05rem; font-weight: 600;
        padding: .15rem .7rem; border-radius: 4px;
        margin-right: .4rem;
    }
    .educations-items .preview-item span:nth-child(6),
    .experiences-items .preview-item span:nth-child(6) {
        display: block; font-size: 1.15rem;
        color: #6a7a9a; margin-top: .4rem;
    }

    /* Projects */
    .projects-items .preview-item span { display: block; }
    .projects-items .preview-item span:first-child {
        font-family: var(--resume-serif); font-weight: 600;
        font-size: 1.3rem; color: #0f1e3d;
    }
    .projects-items .preview-item span:nth-child(2) {
        font-size: 1.1rem; color: #7a8aaa; margin-bottom: .2rem;
    }
    .projects-items .preview-item span:nth-child(3) {
        font-size: 1.15rem; color: #3a4a70;
    }

    /* Achievements */
    .achievements-items .preview-item span:first-child {
        display: block; font-weight: 700; font-size: 1.25rem;
        color: #0f1e3d;
    }
    .achievements-items .preview-item span:nth-child(2) {
        display: block; font-size: 1.15rem; color: #6a7a9a;
    }

    /* ── RESPONSIVE ── */
    @media (min-width: 600px) {
        .cols-3 { grid-template-columns: repeat(3,1fr); }
        .cols-2 { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 960px) {
        .builder-wrap { grid-template-columns: 1fr; }
        .form-panel { max-height: none; overflow-y: visible; }
        .preview-panel { position: static; height: auto; }
        .form-panel-inner { max-width: 100%; }
    }
    @media (max-width: 520px) {
        .preview-cnt { grid-template-columns: 1fr; }
    }

    /* ── PRINT ── */
    @media print {
        body * { visibility: hidden; }
        .non_print_area { display: none !important; }
        .print_area, .print_area * { visibility: visible; }
        .print_area { width: 100%; position: absolute; left: 0; top: 0; }
        .preview-cnt { box-shadow: none; border-radius: 0; }
        .preview-topbar { display: none !important; }
    }
    </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav class="site-nav">
    <div class="container">
        <a href="index.html" class="nav-brand">
            <img src="assets/images/curriculum-vitae.png" alt="" class="nav-brand-icon">
            ProCV <em>Path.</em>
        </a>
        <a href="index.html" class="nav-back">
            ← Back to Home
        </a>
    </div>
</nav>

<!-- ── SPLIT LAYOUT ── -->
<div class="builder-wrap">

    <!-- ══ FORM PANEL ══ -->
    <section class="form-panel non_print_area">
        <div class="form-panel-inner">
            <h1 class="form-panel-title">Build Your Resume</h1>
            <p class="form-panel-sub">Fill in your details — watch the preview update in real time →</p>

            <form action="" class="cv-form" id="cv-form">

                <!-- PERSONAL INFO -->
                <div class="cv-form-blk">
                    <div class="cv-form-row-title">
                        <span class="cv-form-row-title-icon">👤</span>
                        <h3>Personal Info</h3>
                    </div>
                    <div class="cv-form-row cv-form-row-about">
                        <div class="cols-3">
                            <div class="form-elem">
                                <label class="form-label">First Name</label>
                                <input name="firstname" type="text" class="form-control firstname" onkeyup="generateCV()" placeholder="e.g. John">
                                <span class="form-text"></span>
                            </div>
                            <div class="form-elem">
                                <label class="form-label">Middle Name <span class="opt-text">(optional)</span></label>
                                <input name="middlename" type="text" class="form-control middlename" onkeyup="generateCV()" placeholder="e.g. Herbert">
                                <span class="form-text"></span>
                            </div>
                            <div class="form-elem">
                                <label class="form-label">Last Name</label>
                                <input name="lastname" type="text" class="form-control lastname" onkeyup="generateCV()" placeholder="e.g. Doe">
                                <span class="form-text"></span>
                            </div>
                        </div>
                        <div class="cols-3">
                            <div class="form-elem">
                                <label class="form-label">Photo</label>
                                <input name="image" type="file" class="form-control image" accept="image/*" onchange="previewImage()">
                            </div>
                            <div class="form-elem">
                                <label class="form-label">Designation</label>
                                <input name="designation" type="text" class="form-control designation" onkeyup="generateCV()" placeholder="e.g. Sr. Accountant">
                                <span class="form-text"></span>
                            </div>
                            <div class="form-elem">
                                <label class="form-label">Address</label>
                                <input name="address" type="text" class="form-control address" onkeyup="generateCV()" placeholder="e.g. Lake Street-23">
                                <span class="form-text"></span>
                            </div>
                        </div>
                        <div class="cols-3">
                            <div class="form-elem">
                                <label class="form-label">Email</label>
                                <input name="email" type="text" class="form-control email" onkeyup="generateCV()" placeholder="john@email.com">
                                <span class="form-text"></span>
                            </div>
                            <div class="form-elem">
                                <label class="form-label">Phone</label>
                                <input name="phoneno" type="text" class="form-control phoneno" onkeyup="generateCV()" placeholder="456-768-798">
                                <span class="form-text"></span>
                            </div>
                            <div class="form-elem">
                                <label class="form-label">Summary</label>
                                <input name="summary" type="text" class="form-control summary" onkeyup="generateCV()" placeholder="Brief professional bio">
                                <span class="form-text"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- EDUCATION -->
                <div class="cv-form-blk">
                    <div class="cv-form-row-title">
                        <span class="cv-form-row-title-icon">🎓</span>
                        <h3>Education</h3>
                    </div>
                    <div class="row-separator repeater cv-form-row-about">
                        <div class="repeater" data-repeater-list="group-c">
                            <div data-repeater-item>
                                <div class="cv-form-row cv-form-row-experience">
                                    <div class="cols-3">
                                        <div class="form-elem">
                                            <label class="form-label">School</label>
                                            <input name="edu_school" type="text" class="form-control edu_school" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">Degree</label>
                                            <input name="edu_degree" type="text" class="form-control edu_degree" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">City</label>
                                            <input name="edu_city" type="text" class="form-control edu_city" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                    </div>
                                    <div class="cols-3">
                                        <div class="form-elem">
                                            <label class="form-label">Start Date</label>
                                            <input name="edu_start_date" type="date" class="form-control edu_start_date" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">End Date</label>
                                            <input name="edu_graduation_date" type="date" class="form-control edu_graduation_date" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">Description</label>
                                            <input name="edu_description" type="text" class="form-control edu_description" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                    </div>
                                    <button data-repeater-delete type="button" class="repeater-remove-btn">−</button>
                                </div>
                            </div>
                        </div>
                        <button type="button" data-repeater-create class="repeater-add-btn">+</button>
                    </div>
                </div>

                <!-- EXPERIENCE -->
                <div class="cv-form-blk">
                    <div class="cv-form-row-title">
                        <span class="cv-form-row-title-icon">💼</span>
                        <h3>Experience</h3>
                    </div>
                    <div class="row-separator repeater cv-form-row-about">
                        <div class="repeater" data-repeater-list="group-b">
                            <div data-repeater-item>
                                <div class="cv-form-row cv-form-row-experience">
                                    <div class="cols-3">
                                        <div class="form-elem">
                                            <label class="form-label">Title</label>
                                            <input name="exp_title" type="text" class="form-control exp_title" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">Company / Org</label>
                                            <input name="exp_organization" type="text" class="form-control exp_organization" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">Location</label>
                                            <input name="exp_location" type="text" class="form-control exp_location" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                    </div>
                                    <div class="cols-3">
                                        <div class="form-elem">
                                            <label class="form-label">Start Date</label>
                                            <input name="exp_start_date" type="date" class="form-control exp_start_date" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">End Date</label>
                                            <input name="exp_end_date" type="date" class="form-control exp_end_date" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">Description</label>
                                            <input name="exp_description" type="text" class="form-control exp_description" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                    </div>
                                    <button data-repeater-delete type="button" class="repeater-remove-btn">−</button>
                                </div>
                            </div>
                        </div>
                        <button type="button" data-repeater-create class="repeater-add-btn">+</button>
                    </div>
                </div>

                <!-- PROJECTS -->
                <div class="cv-form-blk">
                    <div class="cv-form-row-title">
                        <span class="cv-form-row-title-icon">🚀</span>
                        <h3>Projects</h3>
                    </div>
                    <div class="row-separator repeater cv-form-row-about">
                        <div class="repeater" data-repeater-list="group-d">
                            <div data-repeater-item>
                                <div class="cv-form-row cv-form-row-experience">
                                    <div class="cols-3">
                                        <div class="form-elem">
                                            <label class="form-label">Project Name</label>
                                            <input name="proj_title" type="text" class="form-control proj_title" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">Project Link</label>
                                            <input name="proj_link" type="text" class="form-control proj_link" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">Description</label>
                                            <input name="proj_description" type="text" class="form-control proj_description" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                    </div>
                                    <button data-repeater-delete type="button" class="repeater-remove-btn">−</button>
                                </div>
                            </div>
                        </div>
                        <button type="button" data-repeater-create class="repeater-add-btn">+</button>
                    </div>
                </div>

                <!-- ACHIEVEMENTS -->
                <div class="cv-form-blk">
                    <div class="cv-form-row-title">
                        <span class="cv-form-row-title-icon">🏅</span>
                        <h3>Achievements</h3>
                    </div>
                    <div class="row-separator repeater cv-form-row-about">
                        <div class="repeater" data-repeater-list="group-a">
                            <div data-repeater-item>
                                <div class="cv-form-row cv-form-row-achievement">
                                    <div class="cols-2">
                                        <div class="form-elem">
                                            <label class="form-label">Title</label>
                                            <input name="achieve_title" type="text" class="form-control achieve_title" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                        <div class="form-elem">
                                            <label class="form-label">Description</label>
                                            <input name="achieve_description" type="text" class="form-control achieve_description" onkeyup="generateCV()">
                                            <span class="form-text"></span>
                                        </div>
                                    </div>
                                    <button data-repeater-delete type="button" class="repeater-remove-btn">−</button>
                                </div>
                            </div>
                        </div>
                        <button type="button" data-repeater-create class="repeater-add-btn">+</button>
                    </div>
                </div>

                <!-- SKILLS -->
                <div class="cv-form-blk">
                    <div class="cv-form-row-title">
                        <span class="cv-form-row-title-icon">⚙️</span>
                        <h3>Skills</h3>
                    </div>
                    <div class="row-separator repeater cv-form-row-about">
                        <div class="repeater" data-repeater-list="group-e">
                            <div data-repeater-item>
                                <div class="cv-form-row cv-form-row-skills">
                                    <div class="form-elem">
                                        <label class="form-label">Skill</label>
                                        <input name="skill" type="text" class="form-control skill" onkeyup="generateCV()" placeholder="e.g. JavaScript, Leadership…">
                                        <span class="form-text"></span>
                                    </div>
                                    <button data-repeater-delete type="button" class="repeater-remove-btn">−</button>
                                </div>
                            </div>
                        </div>
                        <button type="button" data-repeater-create class="repeater-add-btn">+</button>
                    </div>
                </div>

            </form>
        </div>
    </section>

    <!-- ══ PREVIEW PANEL ══ -->
    <section class="preview-panel print_area">

        <!-- Topbar (hidden on print) -->
        <div class="preview-topbar non_print_area">
            <span class="preview-label">Live Preview</span>
            <button class="print-btn" onclick="printCV()">
                🖨️ &nbsp;Print / Save PDF
            </button>
        </div>

        <!-- ══ RESUME CARD ══ -->
        <div class="preview-cnt">

            <!-- LEFT SIDEBAR -->
            <div class="preview-cnt-l">
                <!-- Name / Photo / Designation -->
                <div class="preview-blk" style="text-align:center">
                    <div class="preview-image">
                        <img src="" alt="" id="image_dsp">
                    </div>
                    <div class="preview-item preview-item-name">
                        <span class="preview-item-val" id="fullname_dsp"></span>
                    </div>
                    <div class="preview-designation">
                        <span id="designation_dsp"></span>
                    </div>
                </div>

                <!-- Contact -->
                <div class="preview-blk">
                    <div class="preview-blk-title"><h3>Contact</h3></div>
                    <div class="preview-blk-list">
                        <div class="preview-item"><span class="preview-item-val" id="phoneno_dsp"></span></div>
                        <div class="preview-item"><span class="preview-item-val" id="email_dsp"></span></div>
                        <div class="preview-item"><span class="preview-item-val" id="address_dsp"></span></div>
                    </div>
                </div>

                <!-- Summary -->
                <div class="preview-blk">
                    <div class="preview-blk-title"><h3>Summary</h3></div>
                    <div class="preview-blk-list">
                        <div class="preview-item"><span class="preview-item-val" id="summary_dsp"></span></div>
                    </div>
                </div>

                <!-- Skills -->
                <div class="preview-blk">
                    <div class="preview-blk-title"><h3>Skills</h3></div>
                    <div class="skills-items preview-blk-list" id="skills_dsp"></div>
                </div>
            </div>

            <!-- RIGHT MAIN -->
            <div class="preview-cnt-r">
                <div class="preview-blk">
                    <div class="preview-blk-title"><h3>Education</h3></div>
                    <div class="educations-items preview-blk-list" id="educations_dsp"></div>
                </div>
                <div class="preview-blk">
                    <div class="preview-blk-title"><h3>Experience</h3></div>
                    <div class="experiences-items preview-blk-list" id="experiences_dsp"></div>
                </div>
                <div class="preview-blk">
                    <div class="preview-blk-title"><h3>Projects</h3></div>
                    <div class="projects-items preview-blk-list" id="projects_dsp"></div>
                </div>
                <div class="preview-blk">
                    <div class="preview-blk-title"><h3>Achievements</h3></div>
                    <div class="achievements-items preview-blk-list" id="achievements_dsp"></div>
                </div>
            </div>
        </div>

    </section>

</div>
